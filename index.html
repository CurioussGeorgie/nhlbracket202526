<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2025-26 Playoff Bracket Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&amp;family=Open+Sans:wght@400;600&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <div class="hero">
    <h1>NHL 2025-26 Playoffs</h1>
    <p>Predict the 2025-26 NHL Playoffs. Pick your winners and series lengths to claim glory.</p>
  </div>
  
  <div class="container">
    <div id="global-error" class="error-msg hidden"></div>
    <div id="status-message" class="hidden"></div>
    
    <div id="bracket-section" data-requires="bracket">
      <div class="bracket-scroll-wrapper">
        <div class="bracket">
          
          <div class="bracket-half left-half">
            <!-- JS generates left side -->
          </div>

          <div class="bracket-center">
            <!-- JS generates center -->
          </div>

          <div class="bracket-half right-half">
            <!-- JS generates right side -->
          </div>
          
        </div>
      </div>
      
      <div class="form-section">
        <h3>Submit Your Bracket</h3>
        <p>Complete all 15 matchup picks to submit your prediction.</p>
        <button id="submit-btn" class="btn primary-btn" disabled="">Complete all picks</button>
      </div>
    </div>
    
    <!-- Email Collection Form (Phase 2) -->
    <div id="email-section" class="hidden">
      <h3>Enter Details to Finalize</h3>
      <p style="margin-bottom: 25px; color: #cbd5e1;">Almost done! Where should we notify you if you win?</p>
      <form id="entry-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" required="" placeholder="Jane Doe">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required="" placeholder="jane@example.com">
        </div>
        <button type="submit" class="btn primary-btn">Complete Entry</button>
      </form>
    </div>

    <div id="wbx-powered-by-slot"></div>
  </div>

  <script src="app.js"></script>

</body></html>
