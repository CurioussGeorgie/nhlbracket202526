<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NHL Bracket Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <section class="hero">
    <h1>NHL Bracket Challenge</h1>
    <p>Pick the winner of every series and choose your Stanley Cup champion.</p>
  </section>

  <div class="container">
    <div id="global-error" class="error-msg hidden"></div>
    <div id="status-message" class="hidden"></div>

    <section id="bracket-section">
      <div class="bracket-scroll-wrapper">
        <div class="bracket">
          <div class="bracket-half left-half"></div>
          <div class="bracket-center"></div>
          <div class="bracket-half right-half"></div>
        </div>
      </div>

      <div class="form-section">
        <h2>Finish Your Bracket</h2>
        <p>Your picks stay on this device so you can come back later.</p>
        <button id="submit-btn" class="btn primary-btn" disabled>Complete all picks</button>

        <div class="share-panel">
          <h3>Save or Share</h3>
          <p>Copy your picks summary after you finish.</p>
          <div class="share-actions">
            <input type="text" id="share-input" readonly value="Finish your bracket to generate a share summary.">
            <button id="copy-btn" class="btn secondary-btn" type="button">Copy</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
